name: Generate Star History

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate star history SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: Leo1998-Lu
          REPO_NAME: ai-paper2slide-skill
        run: |
          python scripts/generate_star_history.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/star-history.svg assets/star-history.json
          git diff --cached --quiet || git commit -m "chore: update star history chart"
          git push
