name: Generate Star History

on:
  schedule:
    # 每天 UTC 时间 00:00 (北京时间早上 8:00) 自动执行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允许你在 GitHub Actions 页面手动点击触发

permissions:
  contents: write # 必须，用于允许 Bot 提交生成的图片回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib
          
      - name: Run Python script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_star_history.py
        
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update star history chart"
          file_pattern: "star_history.png"
